services:
  - type: web
    name: graven-metal-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_ISSUER
        value: graven-metal-api
      - key: JWT_AUDIENCE
        value: graven-metal-client
      - key: CLIENT_URLS
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: MONGO_MAX_POOL_SIZE
        value: 10
      - key: MONGO_MIN_POOL_SIZE
        value: 1
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: 10000
      - key: MONGO_SOCKET_TIMEOUT_MS
        value: 45000
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
